<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🌾 3WHL — Grafico Completo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fff;--bg2:#f8f9fa;--bg3:#f1f3f5;
  --border:#dee2e6;--text:#212529;--text2:#495057;--text3:#868e96;
  --green:#2f9e44;--red:#c92a2a;--orange:#e67700;
  --wheat:#c8960c;--accent:#1971c2;
  --kf:#dc2626;--ks:#7c3aed;
  --font-mono:'Space Mono',monospace;
  --font-cond:'Barlow Condensed',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1208;color:#e8dcc8;font-family:var(--font-cond);overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:#1a1208;border-bottom:2px solid #3a2808;display:flex;align-items:center;gap:12px;padding:0 16px;height:48px;flex-shrink:0}
.logo{font-weight:800;font-size:16px;letter-spacing:3px;color:var(--wheat)}
.ticker{font-family:var(--font-mono);font-size:20px;font-weight:700;color:#fff}
.price{font-family:var(--font-mono);font-size:18px;font-weight:700}
.pl{font-family:var(--font-mono);font-size:13px}
.spacer{flex:1}

/* STATS BAR */
.statsbar{background:#120d04;border-bottom:1px solid #3a2808;display:flex;gap:6px;padding:5px 16px;flex-shrink:0;flex-wrap:wrap;align-items:center}
.stat{background:#2a1e08;border:1px solid #3a2808;border-radius:4px;padding:3px 10px;text-align:center;min-width:70px}
.stat .sl{font-size:8px;color:#8a7050;letter-spacing:.5px;text-transform:uppercase;margin-bottom:1px}
.stat .sv{font-family:var(--font-mono);font-size:12px;font-weight:700;color:#e8dcc8}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:1px}
.badge.stop{background:#3a0808;color:#ff6b6b;border:1px solid #c92a2a}
.badge.lc{background:#0a2e14;color:#69db7c;border:1px solid #2f9e44}
.badge.le{background:#0a1a2e;color:#74c0fc;border:1px solid #1971c2}
.badge.warn{background:#2e1e00;color:#ffd43b;border:1px solid #e67700}
.sep{width:1px;height:28px;background:#3a2808;flex-shrink:0}

/* TIMEFRAME */
.tf-bar{display:flex;gap:4px}
.tf-btn{background:#2a1e08;border:1px solid #3a2808;color:#8a7050;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:10px;font-weight:700;font-family:var(--font-cond);letter-spacing:1px;transition:all .12s}
.tf-btn:hover,.tf-btn.act{background:var(--wheat);border-color:var(--wheat);color:#1a1208}

/* CARICO LINE INFO */
.carico-info{background:#2e1e00;border:1px solid #e67700;border-radius:4px;padding:3px 10px;font-size:10px;color:#ffd43b;font-family:var(--font-mono)}

/* CHART AREA */
.chart-area{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:0}
#chart-container{flex:1;overflow:hidden}

/* LINK */
.btn-back{background:transparent;border:1px solid #3a2808;color:#8a7050;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:10px;font-family:var(--font-cond);letter-spacing:1px;text-decoration:none;transition:all .12s}
.btn-back:hover{border-color:var(--wheat);color:var(--wheat)}

/* SEGNALI RIEPILOGO */
.signals-bar{background:#120d04;border-top:1px solid #3a2808;padding:6px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.sig-title{font-size:9px;color:#8a7050;font-family:var(--font-cond);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.sig-item{display:flex;align-items:center;gap:5px;background:#2a1e08;border:1px solid #3a2808;border-radius:4px;padding:3px 8px;font-size:9px;font-family:var(--font-mono)}
.sig-item.buy3{border-color:#2f9e44;background:#0a2e14}
.sig-item.buy2{border-color:#1971c2;background:#0a1a2e}
.sig-item.sell{border-color:#c92a2a;background:#2e0808}
.sig-arrow{font-size:11px;font-weight:700}
.sig-date{color:#8a7050}
.sig-price{font-weight:700}
.btn-pdf{background:#c8960c;border:none;color:#1a1208;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:10px;font-family:var(--font-cond);font-weight:800;letter-spacing:1px;margin-left:auto;transition:all .12s}
.btn-pdf:hover{background:#e8b020}

</style>
</head>
<body>

<div class="topbar">
  <div class="logo">🌾</div>
  <div class="ticker">3WHL</div>
  <div class="price" id="sPrezzo" style="color:var(--wheat)">—</div>
  <div class="pl" id="sPL">—</div>
  <div class="spacer"></div>
  <div class="tf-bar">
    <button class="tf-btn" onclick="setTF(63)"  id="tf3m">3M</button>
    <button class="tf-btn act" onclick="setTF(126)" id="tf6m">6M</button>
    <button class="tf-btn" onclick="setTF(252)" id="tf1a">1A</button>
    <button class="tf-btn" onclick="setTF(756)" id="tf3a">3A</button>
    <button class="tf-btn" onclick="setTF(9999)" id="tfAll">ALL</button>
  </div>
  <a class="btn-back" href="wheat.html">← Torna</a>
</div>

<div class="statsbar">
  <div class="stat"><div class="sl">KAMA Fast</div><div class="sv" id="sKF" style="color:var(--kf)">—</div></div>
  <div class="stat"><div class="sl">KAMA Slow</div><div class="sv" id="sKS" style="color:#7c3aed">—</div></div>
  <div class="stat"><div class="sl">SAR</div><div class="sv" id="sSAR">—</div></div>
  <div class="stat"><div class="sl">AO</div><div class="sv" id="sAO">—</div></div>
  <div class="stat"><div class="sl">RSI 14</div><div class="sv" id="sRSI14" style="color:var(--orange)">—</div></div>
  <div class="stat"><div class="sl">RSI 5</div><div class="sv" id="sRSI5" style="color:var(--accent)">—</div></div>
  <div class="stat"><div class="sl">ER</div><div class="sv" id="sER">—</div></div>
  <div class="sep"></div>
  <span id="badgeZona">—</span>
  <span id="badgeSegnale">—</span>
  <div class="sep"></div>
  <div class="carico-info">📍 Carico: <strong>0.2300</strong> · 50.000 quote · P&L: <strong id="plCarico">—</strong></div>
  <div class="sep"></div>
  <div class="stat"><div class="sl">Min storico</div><div class="sv" style="color:var(--green)">0.0959</div></div>
  <div class="stat"><div class="sl">Max storico</div><div class="sv" style="color:var(--red)">0.1924</div></div>
</div>

<div class="chart-area">
  <div id="chart-container">
    <div id="chart-inner" style="padding:20px;text-align:center;color:#8a7050;font-family:var(--font-cond)">⏳ Caricamento...</div>
  </div>
</div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/Giorgiogoldoni/wheat/main/wheat.json';
let D = null, currentTF = 126;

async function init() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    D = await r.json();
    updateStats();
    drawChart();
    renderSignals();
  } catch(e) {
    document.getElementById('chart-inner').textContent = '❌ '+e.message;
  }
}

function setTF(bars) {
  currentTF=bars;
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('act'));
  const map={63:'tf3m',126:'tf6m',252:'tf1a',756:'tf3a',9999:'tfAll'};
  if(map[bars]) document.getElementById(map[bars]).classList.add('act');
  if(D) { drawChart(); renderSignals(); }
}

function updateStats() {
  const w=D.whl;
  const lc=w.closes.filter(v=>v!=null).at(-1);
  const kf=w.kama_fast.filter(v=>v!=null).at(-1);
  const ks=w.kama_slow.filter(v=>v!=null).at(-1);
  const sar=w.sar.filter(v=>v!=null).at(-1);
  const ao=w.ao.at(-1);
  const r14=w.rsi14.filter(v=>v!=null).at(-1);
  const r5=w.rsi5.filter(v=>v!=null).at(-1);
  const er=w.er.at(-1);
  const f=v=>v!=null?(+v).toFixed(4):'—';

  document.getElementById('sPrezzo').textContent=f(lc);
  document.getElementById('sKF').textContent=f(kf);
  document.getElementById('sKS').textContent=f(ks);
  document.getElementById('sSAR').textContent=f(sar);
  document.getElementById('sAO').textContent=ao!=null?(ao>0?'+':'')+ao.toFixed(4):'—';
  document.getElementById('sRSI14').textContent=r14!=null?r14.toFixed(1):'—';
  document.getElementById('sRSI5').textContent=r5!=null?r5.toFixed(1):'—';
  document.getElementById('sER').textContent=er!=null?er.toFixed(3):'—';

  // P&L vs carico
  const carico=0.23, qty=50000;
  if(lc){
    const pl=(lc-carico)*qty;
    const pct=(lc-carico)/carico*100;
    document.getElementById('sPL').textContent=(pct>=0?'+':'')+pct.toFixed(2)+'%';
    document.getElementById('sPL').style.color=pct>=0?'var(--green)':'var(--red)';
    document.getElementById('plCarico').textContent=(pct>=0?'+':'')+pct.toFixed(2)+'% ('+pl.toFixed(0)+'€)';
    document.getElementById('plCarico').style.color=pct>=0?'#69db7c':'#ff6b6b';
  }

  // Zona
  const zona=kf&&ks&&lc?(lc>kf&&kf>ks?'LONG_CONF':lc>kf&&lc>ks?'LONG_EARLY':lc<ks?((ks-lc)/ks*100>2?'STOP':'USCITA'):'GRIGIA'):'—';
  const zmap={'LONG_CONF':['LONG CONF','lc'],'LONG_EARLY':['LONG EARLY','le'],'GRIGIA':['GRIGIA','warn'],'USCITA':['USCITA','warn'],'STOP':['⛔ STOP','stop']};
  const [zlbl,zcls]=zmap[zona]||['—',''];
  document.getElementById('badgeZona').innerHTML=`<span class="badge ${zcls}">${zlbl}</span>`;

  const lastSig=[...(w.signals||[])].reverse().find(s=>s!=null);
  if(lastSig){
    const sc={BUY3:'lc',BUY2:'le',SELL:'stop',WATCH:'warn'}[lastSig]||'';
    document.getElementById('badgeSegnale').innerHTML=`<span class="badge ${sc}">${lastSig}</span>`;
  }
}

function drawChart() {
  const w=D.whl;
  const total=w.closes.length;
  const n=Math.min(currentTF,total);
  const sl=total-n;
  const slice=arr=>(arr||[]).slice(sl);

  const closes=slice(w.closes), kf=slice(w.kama_fast), ks=slice(w.kama_slow);
  const sar=slice(w.sar), ao=slice(w.ao), r14=slice(w.rsi14), r5=slice(w.rsi5);
  const sigs=slice(w.signals), dates=slice(w.dates), vols=slice(w.volumes);
  const N=closes.length;

  const wrap=document.getElementById('chart-container');
  const W=Math.max(wrap.clientWidth-2,500);
  const PAD={l:58,r:36,t:4,b:18};
  const PW=W-PAD.l-PAD.r;

  // Pannelli: price grande, vol piccolo, ao, rsi
  const panels=[
    {h:Math.floor(wrap.clientHeight*0.52), id:'price'},
    {h:Math.floor(wrap.clientHeight*0.09), id:'vol'},
    {h:Math.floor(wrap.clientHeight*0.15), id:'ao'},
    {h:Math.floor(wrap.clientHeight*0.20), id:'rsi'},
  ];
  const GAP=6;
  const totalH=panels.reduce((s,p)=>s+p.h+GAP,0)+PAD.t+PAD.b;

  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',W); svg.setAttribute('height',totalH);
  svg.style.cssText='display:block;background:#1a1208';

  function xPos(i){return PAD.l+(i/Math.max(N-1,1))*PW;}
  function scY(v,mn,mx,yT,h){if(mx===mn)return yT+h/2;return yT+h-((v-mn)/(mx-mn))*h;}
  function el(tag,attrs,par){const e=document.createElementNS(ns,tag);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);(par||svg).appendChild(e);return e;}
  function line(x1,y1,x2,y2,stroke,sw=0.5,dash=''){el('line',{x1:x1.toFixed(1),y1:y1.toFixed(1),x2:x2.toFixed(1),y2:y2.toFixed(1),stroke,'stroke-width':sw,...(dash?{'stroke-dasharray':dash}:{})});}
  function polyline(pts,stroke,sw=1.5,dash=''){if(pts.length<2)return;el('polyline',{points:pts.map(([x,y])=>`${x.toFixed(1)},${y.toFixed(1)}`).join(' '),stroke,'stroke-width':sw,fill:'none','stroke-linejoin':'round',...(dash?{'stroke-dasharray':dash}:{})});}
  function rect(x,y,w2,h2,fill,op=1){if(w2<=0||h2<=0)return;el('rect',{x:x.toFixed(1),y:y.toFixed(1),width:Math.max(0,w2).toFixed(1),height:Math.max(0,h2).toFixed(1),fill,opacity:op});}
  function txt(x,y,s,fill,size=8,anchor='middle',weight='normal'){const e=el('text',{x:x.toFixed(1),y:y.toFixed(1),fill,'font-size':size,'font-family':'Space Mono,monospace','text-anchor':anchor,'font-weight':weight});e.textContent=s;}
  function tri(cx,cy,sz,up,fill){const pts=up?`${cx},${cy-sz} ${cx-sz},${cy+sz} ${cx+sz},${cy+sz}`:`${cx},${cy+sz} ${cx-sz},${cy-sz} ${cx+sz},${cy-sz}`;el('polygon',{points:pts,fill});}

  let yOff=PAD.t;

  panels.forEach(panel=>{
    const yTop=yOff, h=panel.h;
    rect(PAD.l,yTop,PW,h,'#120d04');

    // Griglia orizzontale
    for(let g=0;g<=4;g++){
      const gy=yTop+h/4*g;
      line(PAD.l,gy,PAD.l+PW,gy,g===0||g===4?'#3a2808':'#2a1e08',g===0||g===4?.8:.4);
    }

    // ── PRICE ────────────────────────────────────────
    if(panel.id==='price'){
      const carico=0.23;
      const allP=[...closes,...kf.filter(v=>v),...ks.filter(v=>v)].filter(v=>v);
      const mn=Math.min(...allP,carico)*.994, mx=Math.max(...allP)*1.006;
      const sy=v=>scY(v,mn,mx,yTop,h);

      // Etichette asse Y
      for(let g=0;g<=5;g++){
        const v=mn+(mx-mn)/5*g;
        txt(PAD.l-4,sy(v)+3,v<1?v.toFixed(4):v.toFixed(2),'#5a4030',7.5,'end');
      }

      // Linea carico (arancione tratteggiata)
      const yc=sy(carico);
      line(PAD.l,yc,PAD.l+PW,yc,'#e67700',1.5,'6,4');
      txt(PAD.l+PW+4,yc-3,'0.23 carico','#e67700',7,'start');

      // Min storico (verde tratteggiata)
      const ymin=sy(0.0959);
      line(PAD.l,ymin,PAD.l+PW,ymin,'#2f9e44',1,'4,3');
      txt(PAD.l+PW+4,ymin-3,'min 0.0959','#2f9e44',7,'start');

      // Area fill KAMA
      const fp=[];
      for(let i=0;i<N;i++) if(kf[i]!=null&&ks[i]!=null) fp.push(i);
      if(fp.length>1){
        let ss=fp[0],pa=kf[fp[0]]>ks[fp[0]];
        const df=(fr,to,ab)=>{
          const tp=[],bp=[];
          for(let i=fr;i<=to;i++){if(kf[i]==null||ks[i]==null)continue;tp.push([xPos(i),sy(ab?kf[i]:ks[i])]);bp.unshift([xPos(i),sy(ab?ks[i]:kf[i])]);}
          const pts=[...tp,...bp];if(pts.length<3)return;
          el('polygon',{points:pts.map(([x,y])=>`${x.toFixed(1)},${y.toFixed(1)}`).join(' '),fill:ab?'#2f9e44':'#c92a2a',opacity:'.12'});
        };
        for(let ii=1;ii<fp.length;ii++){const i=fp[ii],ab=kf[i]>ks[i];if(ab!==pa||ii===fp.length-1){df(ss,fp[ii-(ii===fp.length-1?0:1)],pa);ss=i;pa=ab;}}
      }

      // KAMA Slow (viola)
      polyline(ks.map((v,i)=>v!=null?[xPos(i),sy(v)]:null).filter(Boolean),'#7c3aed',2);
      // KAMA Fast (rosso)
      polyline(kf.map((v,i)=>v!=null?[xPos(i),sy(v)]:null).filter(Boolean),'#dc2626',1.8);
      // Prezzo (wheat)
      polyline(closes.map((v,i)=>v!=null?[xPos(i),sy(v)]:null).filter(Boolean),'#c8960c',2.2);

      // SAR
      sar.forEach((v,i)=>{if(v==null||closes[i]==null)return;const bull=closes[i]>v;el('circle',{cx:xPos(i).toFixed(1),cy:sy(v).toFixed(1),r:2.2,fill:bull?'#2f9e44':'#c92a2a'});});

      // Segnali
      let ps=null;
      sigs.forEach((s,i)=>{
        if(!s||s===ps||closes[i]==null)return;
        const col={BUY3:'#2f9e44',BUY2:'#1971c2',SELL:'#c92a2a',WATCH:'#e67700'}[s]||'#868e96';
        const up=s==='BUY3'||s==='BUY2';
        tri(xPos(i),sy(closes[i])+(up?14:-14),6,up,col);
        ps=s;
      });

      // Prezzo attuale label
      const lc2=closes.filter(v=>v!=null).at(-1);
      if(lc2){
        const ly=sy(lc2);
        rect(PAD.l+PW+2,ly-7,34,14,'#c8960c');
        txt(PAD.l+PW+19,ly+4,lc2<1?lc2.toFixed(4):lc2.toFixed(2),'#1a1208',7.5);
      }
    }

    // ── VOLUME ───────────────────────────────────────
    if(panel.id==='vol'){
      const vmax=Math.max(...vols.filter(v=>v>0),1);
      const avg=vols.filter(v=>v>0).reduce((s,v)=>s+v,0)/vols.filter(v=>v>0).length;
      const bW=Math.max(1,PW/N-.5);
      const avgY=yTop+h-(avg/vmax)*h;
      line(PAD.l,avgY,PAD.l+PW,avgY,'#3a2808',.8,'3,3');
      vols.forEach((v,i)=>{
        if(v<=0)return;
        const vh=(v/vmax)*h;
        const col=v>=avg*2?'#c8960c':closes[i]>=(closes[i-1]||closes[i])?'#2f9e44':'#c92a2a';
        rect(xPos(i)-bW/2,yTop+h-vh,bW,vh,col,.6);
      });
      txt(PAD.l-4,yTop+8,'VOL','#5a4030',6.5,'end');
    }

    // ── AO ───────────────────────────────────────────
    if(panel.id==='ao'){
      const vals=ao.filter(v=>v!=null);
      if(vals.length){
        const mn=Math.min(...vals,0),mx=Math.max(...vals,0);
        const zero=scY(0,mn,mx,yTop,h);
        const bW=Math.max(1,PW/N-.5);
        line(PAD.l,zero,PAD.l+PW,zero,'#3a2808',1);
        ao.forEach((v,i)=>{
          if(v==null)return;
          const prev=ao[i-1]??v;
          const col=v>=prev?'#2f9e44':'#c92a2a';
          const y0=scY(v,mn,mx,yTop,h);
          const bh=Math.abs(y0-zero)||1;
          rect(xPos(i)-bW/2,Math.min(y0,zero),bW,bh,col,.85);
        });
        txt(PAD.l-4,yTop+8,'AO','#5a4030',6.5,'end');
        txt(PAD.l-4,yTop+h,mn.toFixed(3),'#5a4030',6,'end');
        txt(PAD.l-4,yTop+h/2+3,'0','#5a4030',6,'end');
      }
    }

    // ── RSI ──────────────────────────────────────────
    if(panel.id==='rsi'){
      const sy=v=>scY(v,0,100,yTop,h);
      rect(PAD.l,sy(70),PW,sy(30)-sy(70),'#1e1500',.8);
      [70,50,30].forEach(lv=>{
        line(PAD.l,sy(lv),PAD.l+PW,sy(lv),lv===50?'#3a2808':'#2a1e08',.8,lv!==50?'3,3':'');
        txt(PAD.l-4,sy(lv)+3,lv,'#5a4030',7,'end');
      });

      // Fill RSI5 vs RSI14
      const rp=[];for(let i=0;i<N;i++)if(r14[i]!=null&&r5[i]!=null)rp.push(i);
      if(rp.length>1){
        let rs2=rp[0],rb=r5[rp[0]]>r14[rp[0]];
        const dr=(fr,to,bull)=>{const tp=[],bp=[];for(let i=fr;i<=to;i++){if(r14[i]==null||r5[i]==null)continue;tp.push([xPos(i),sy(bull?r5[i]:r14[i])]);bp.unshift([xPos(i),sy(bull?r14[i]:r5[i])]);}const pts=[...tp,...bp];if(pts.length<3)return;el('polygon',{points:pts.map(([x,y])=>`${x.toFixed(1)},${y.toFixed(1)}`).join(' '),fill:bull?'#2f9e44':'#c92a2a',opacity:.15});};
        for(let ii=1;ii<rp.length;ii++){const i=rp[ii],bull=r5[i]>r14[i];if(bull!==rb||ii===rp.length-1){dr(rs2,rp[ii-(ii===rp.length-1?0:1)],rb);rs2=i;rb=bull;}}
      }

      // RSI14 (arancio)
      polyline(r14.map((v,i)=>v!=null?[xPos(i),sy(v)]:null).filter(Boolean),'#e67700',1.8);
      // RSI5 (blu tratteggiato)
      polyline(r5.map((v,i)=>v!=null?[xPos(i),sy(v)]:null).filter(Boolean),'#1971c2',1.4,'5,2');

      // Cross markers
      for(let i=1;i<N;i++){
        if(r14[i]==null||r5[i]==null||r14[i-1]==null||r5[i-1]==null)continue;
        if(r5[i-1]<=r14[i-1]&&r5[i]>r14[i]) tri(xPos(i),sy((r5[i]+r14[i])/2)+5,4,true,'#2f9e44');
        if(r5[i-1]>=r14[i-1]&&r5[i]<r14[i]) tri(xPos(i),sy((r5[i]+r14[i])/2)-5,4,false,'#c92a2a');
      }

      // Valori attuali
      const lr14=r14.filter(v=>v!=null).at(-1),lr5=r5.filter(v=>v!=null).at(-1);
      if(lr14){rect(PAD.l+PW+2,sy(lr14)-5,28,10,'#e67700');txt(PAD.l+PW+16,sy(lr14)+3,lr14.toFixed(0),'#fff',7);}
      if(lr5) {rect(PAD.l+PW+2,sy(lr5)-5,28,10,'#1971c2'); txt(PAD.l+PW+16,sy(lr5)+3,lr5.toFixed(0),'#fff',7);}

      txt(PAD.l-4,yTop+8,'RSI','#5a4030',6.5,'end');
    }

    // Date asse X (solo ultimo pannello)
    if(panel.id==='rsi'){
      const step=Math.max(1,Math.floor(N/8));
      for(let i=0;i<N;i+=step){
        if(dates[i]) txt(xPos(i),totalH-PAD.b+12,dates[i].slice(0,7),'#5a4030',7.5);
      }
    }

    yOff+=h+GAP;
  });

  const inner=document.getElementById('chart-inner');
  inner.innerHTML=''; inner.style.padding='0';
  inner.appendChild(svg);
}

window.addEventListener('resize',()=>{if(D)drawChart();});


// ═══ RIEPILOGO SEGNALI ════════════════════════════
function renderSignals() {
  const w = D.whl;
  const total = w.closes.length;
  const n = Math.min(currentTF, total);
  const sl = total - n;
  const sigs  = w.signals.slice(sl);
  const dates = w.dates.slice(sl);
  const closes= w.closes.slice(sl);

  const collected = [];
  let prev = null;
  sigs.forEach((s, i) => {
    if (s && s !== prev && closes[i]) {
      collected.push({ sig: s, date: dates[i], price: closes[i] });
      prev = s;
    }
  });

  // Mostra ultimi 12 segnali
  const last12 = collected.slice(-12);
  const colMap = { BUY3: 'buy3', BUY2: 'buy2', SELL: 'sell', WATCH: '' };
  const arrowMap = { BUY3: '▲', BUY2: '△', SELL: '▼', WATCH: '◇' };
  document.getElementById('sigList').innerHTML = last12.map(s =>
    `<div class="sig-item ${colMap[s.sig]||''}">
      <span class="sig-arrow" style="color:${s.sig.includes('BUY')?'#69db7c':'#ff6b6b'}">${arrowMap[s.sig]||'?'}</span>
      <span class="sig-price">${s.sig}</span>
      <span class="sig-date">${s.date}</span>
      <span class="sig-price">${s.price.toFixed(4)}</span>
    </div>`
  ).join('');
}
